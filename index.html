<!DOCTYPE html>
<html>
<head>
  <title>Arvorie's Song List 🎵</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      font-family: Arial;
      background: #fff0f5;
      margin: 20px;
    }
    h1 {
      font-size: 3em;
      text-align: center;
      color: #8b0000;
    }
    h1::before, h1::after {
      content: "🎵";
      margin: 0 10px;
    }
    form, #searchDiv, #loginDiv {
      background: #ffe4e1;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 8px;
      margin: 5px;
    }
    button {
      background: #8b0000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.2em;
    }
    th, td {
      border: 1px solid #8b0000;
      padding: 10px;
      text-align: center;
    }
    th {
      background: #fa8072;
    }
    tr.admin-hover:hover {
      background: #ffcccc;
      cursor: pointer;
    }
    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
    }
    .modal-content {
      background:#ffe4e1;
      margin:10% auto;
      padding:20px;
      width:400px;
      border-radius:12px;
    }
    .modal-content input {
      width:100%;
    }
  </style>
</head>

<body>

<h1>Arvorie's Song List</h1>

<!-- FILTERS -->
<div id="searchDiv">
  <input type="text" id="filterSong" placeholder="Name of Song">
  <input type="text" id="filterArtist" placeholder="Artist">
  <input type="text" id="filterGenre" placeholder="Genre">
  <input type="text" id="filterLanguage" placeholder="Language">
  <button id="searchBtn">Search</button>
  <button id="resetBtn">Reset</button>
</div>

<!-- LOGIN -->
<div id="loginDiv">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button id="loginBtn">Login</button>
  <p id="loginMsg" style="color:red;"></p>
</div>

<!-- ADD SONG -->
<form id="musicForm" style="display:none;">
  <input type="text" id="song_name" placeholder="Name of Song" required><br>
  <input type="text" id="artist" placeholder="Artist"><br>
  <input type="text" id="genre" placeholder="Genre"><br>
  <input type="text" id="language" placeholder="Language"><br>
  <input type="date" id="last_performed"><br>
  <button type="submit">Add Song</button>
</form>

<h3>Song List</h3>
<table id="musicTable">
  <thead>
    <tr>
      <th>Name of Song</th>
      <th>Artist</th>
      <th>Genre</th>
      <th>Language</th>
      <th>Date Last Performed</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Song</h3>
    <input type="text" id="editSongName" placeholder="Name of Song"><br>
    <input type="text" id="editArtist" placeholder="Artist"><br>
    <input type="text" id="editGenre" placeholder="Genre"><br>
    <input type="text" id="editLanguage" placeholder="Language"><br>
    <input type="date" id="editLastPerformed"><br><br>
    <button id="saveEditBtn">Save</button>
    <button id="cancelEditBtn">Cancel</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://qkabaxdfqkpanwvagpdn.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let editId = null;

// LOGIN
loginBtn.onclick = async () => {
  const { data, error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){ loginMsg.textContent = error.message; return; }

  user = data.user;
  loginDiv.style.display = "none";
  musicForm.style.display = "block";
  loadData();
};

// LOAD
async function loadData(song="", artist="", genre="", language=""){
  let query = supabase.from("Songs").select("*").order("song_name");

  if(song) query = query.ilike("song_name", `%${song}%`);
  if(artist) query = query.ilike("artist", `%${artist}%`);
  if(genre) query = query.ilike("genre", `%${genre}%`);
  if(language) query = query.ilike("language", `%${language}%`);

  const { data } = await query;

  const tbody = document.querySelector("#musicTable tbody");
  tbody.innerHTML = "";

  data.forEach(row=>{
    let tr = document.createElement("tr");

    if(user){
      tr.classList.add("admin-hover");
      tr.onclick = ()=>openEdit(row);
      tr.oncontextmenu = (e)=>{ e.preventDefault(); deleteSong(row.id); };
    }

    tr.innerHTML = `
      <td>${row.song_name}</td>
      <td>${row.artist}</td>
      <td>${row.genre}</td>
      <td>${row.language}</td>
      <td>${row.last_performed || ""}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ADD
musicForm.onsubmit = async (e)=>{
  e.preventDefault();
  await supabase.from("Songs").insert([{
    song_name: song_name.value,
    artist: artist.value,
    genre: genre.value,
    language: language.value,
    last_performed: last_performed.value
  }]);
  musicForm.reset();
  loadData();
};

// EDIT
function openEdit(row){
  editId = row.id;
  editSongName.value = row.song_name;
  editArtist.value = row.artist;
  editGenre.value = row.genre;
  editLanguage.value = row.language;
  editLastPerformed.value = row.last_performed || "";
  editModal.style.display = "block";
}

saveEditBtn.onclick = async ()=>{
  await supabase.from("Songs").update({
    song_name: editSongName.value,
    artist: editArtist.value,
    genre: editGenre.value,
    language: editLanguage.value,
    last_performed: editLastPerformed.value
  }).eq("id", editId);

  editModal.style.display = "none";
  loadData();
};

cancelEditBtn.onclick = ()=> editModal.style.display="none";

// DELETE
async function deleteSong(id){
  if(!confirm("Delete this song?")) return;
  await supabase.from("Songs").delete().eq("id", id);
  loadData();
}

// FILTERS
searchBtn.onclick = ()=> loadData(
  filterSong.value,
  filterArtist.value,
  filterGenre.value,
  filterLanguage.value
);

resetBtn.onclick = ()=>{
  filterSong.value="";
  filterArtist.value="";
  filterGenre.value="";
  filterLanguage.value="";
  loadData();
};

loadData();
</script>

</body>
</html>
